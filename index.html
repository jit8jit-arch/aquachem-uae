<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SWIMMING POOL/WATER FEATURE CHLORINE & PH CALCULATIONS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* -----------------------------------------------------------
   GLOBAL THEME
----------------------------------------------------------- */
:root {
  --bg: #05070b;
  --accent: #38bdf8;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --border: #1f2937;
  --success: #4ade80;
  --warning: #facc15;
  --danger: #f87171;
  --radius: 12px;
  --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  margin: 0;
  padding: 0;
  background: #020617;
  color: var(--text);
  font-family: var(--font);
}

/* -----------------------------------------------------------
   LAYOUT
----------------------------------------------------------- */
.app {
  max-width: 1250px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

/* -----------------------------------------------------------
   CARD
----------------------------------------------------------- */
.card {
  background: #0b1120;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.card-title {
  font-size: 14px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* -----------------------------------------------------------
   INPUTS
----------------------------------------------------------- */
.field {
  margin-bottom: 10px;
}

.field label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--muted);
}

input, select {
  width: 100%;
  padding: 7px 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0f172a;
  color: var(--text);
  margin-top: 4px;
}

button {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid #334155;
  background: linear-gradient(135deg, #0ea5e9, #22c55e);
  color: #0b1120;
  font-weight: 600;
  text-transform: uppercase;
  cursor: pointer;
  margin-right: 6px;
}

button.secondary {
  background: #0f172a;
  color: var(--muted);
}

/* -----------------------------------------------------------
   TABLE
----------------------------------------------------------- */
.table-card {
  margin-top: 10px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: var(--radius);
  padding: 14px;
}

.table-title {
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.table-meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  padding: 8px;
  text-align: left;
}

thead tr {
  background: #1e293b;
}

.row-daily {
  background: rgba(56,189,248,0.12);
}

.row-weekly {
  background: rgba(250,204,21,0.12);
}

.row-monthly {
  background: rgba(248,113,113,0.12);
}

/* -----------------------------------------------------------
   STATUS
----------------------------------------------------------- */
.status {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
}

.status-dot {
  width: 7px;
  height: 7px;
  background: var(--success);
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}

/* -----------------------------------------------------------
   PRINT
----------------------------------------------------------- */
@media print {
  .no-print { display: none !important; }
  body { background: white; color: black; }
  .card, .table-card {
    background: white !important;
    border-color: #ccc !important;
    box-shadow: none !important;
  }
}
</style>
</head>

<body>
<div class="app">

<!-- ---------------------------------------------------------
     INPUT SECTION
--------------------------------------------------------- -->
<div class="grid">
<div class="card no-print">
  <div class="card-title">Pool Inputs</div>

  <div class="field">
    <label>Project Name</label>
    <input id="projectName" type="text" placeholder="e.g. VILLA POOL" />
  </div>

  <div class="field">
    <label>Project Ref</label>
    <input id="projectRef" type="text" placeholder="e.g. P-24-POOL-017" />
  </div>

  <div class="field">
    <label>Location</label>
    <input id="location" type="text" value="Dubai, UAE" />
  </div>

  <div class="field">
    <label>Surface Area (m²)</label>
    <input id="surfaceArea" type="number" step="0.01" />
  </div>

  <div class="field">
    <label>Average Depth (m)</label>
    <input id="avgDepth" type="number" step="0.01" />
  </div>

  <div class="field">
    <label>Pool Volume (m³)</label>
    <input id="volume" type="number" step="0.01" />
  </div>

  <div class="field">
    <label>Target Free Chlorine (ppm)</label>
    <input id="targetCl" type="number" value="2.5" step="0.1" />
  </div>

  <div class="field">
    <label>UAE Climate Factor</label>
    <input id="uaeFactor" type="number" value="1.25" step="0.05" />
  </div>

  <div class="field">
    <label>Current pH</label>
    <input id="currentPh" type="number" value="7.8" step="0.01" />
  </div>

  <div class="field">
    <label>Target pH</label>
    <input id="targetPh" type="number" value="7.2" step="0.01" />
  </div>

  <div class="field">
    <label>Chlorine Brand</label>
    <select id="brand">
      <option value="HTH® Dry Chlorine Granular (Calcium Hypochlorite 70%)" selected>
        HTH® Dry Chlorine Granular (Calcium Hypochlorite 70%)
      </option>
      <option value="Aquachlor (Calcium Hypochlorite 70%)">Aquachlor (Calcium Hypochlorite 70%)</option>
      <option value="HI-CHLON 65G (≥65% available chlorine)">HI-CHLON 65G (≥65% available chlorine)</option>
    </select>
  </div>

  <button id="calcBtn">Calculate</button>
  <button id="pdfBtn" class="secondary">Export PDF</button>
  <button id="wordBtn" class="secondary">Export Word</button>

  <br><br>

  <button id="saveLocal" class="secondary">Save Settings</button>
  <button id="loadLocal" class="secondary">Load Settings</button>
  <button id="exportJson" class="secondary">Export JSON</button>
  <button id="importJson" class="secondary">Import JSON</button>
  <input id="jsonFile" type="file" accept="application/json" style="display:none;" />

  <div class="status" id="status"><span class="status-dot"></span>Ready</div>
</div>

<!-- ---------------------------------------------------------
     SUMMARY + TABLE
--------------------------------------------------------- -->
<div class="card" id="summaryCard">
  <div class="card-title">Swimming Pool / Water Feature Chlorine & pH Calculations</div>

  <div id="poolDetails"></div>

  <div class="table-card">
    <div class="table-title">Chlorine & Pool Acid Demand Summary (Kg Only)</div>
    <div class="table-meta" id="tableMeta">EFFECTIVE POOL VOLUME: –</div>

    <table>
      <thead>
        <tr>
          <th>PERIOD</th>
          <th>ACTIVE CHLORINE (Kg)</th>
          <th id="brandHeader">BRAND (Kg)</th>
          <th>POOL ACID NaHSO₄ (Kg)</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="row-daily"><td>DAILY</td><td>–</td><td>–</td><td>–</td></tr>
        <tr class="row-weekly"><td>WEEKLY</td><td>–</td><td>–</td><td>–</td></tr>
        <tr class="row-monthly"><td>MONTHLY</td><td>–</td><td>–</td><td>–</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div>
</div>

<script>
/* -----------------------------------------------------------
   CALCULATION LOGIC
----------------------------------------------------------- */
function calc() {
  const name = projectName.value || "N/A";
  const ref = projectRef.value || "N/A";
  const loc = location.value || "Dubai, UAE";
  const area = parseFloat(surfaceArea.value);
  const depth = parseFloat(avgDepth.value);
  const volInput = parseFloat(volume.value);
  const targetCl = parseFloat(targetCl.value);
  const uae = parseFloat(uaeFactor.value);
  const phNow = parseFloat(currentPh.value);
  const phTarget = parseFloat(targetPh.value);
  const brandName = brand.value;

  let volumeM3 = volInput || (area * depth);

  const dailyCl = volumeM3 * targetCl * uae / 1000;
  const brandKg = dailyCl / 0.70;
  const phDrop = phNow - phTarget;
  const acidKg = phDrop > 0 ? (volumeM3 * phDrop * 50) / 7000 : 0;

  poolDetails.innerHTML = `
    <p><strong>PROJECT NAME:</strong> ${name}</p>
    <p><strong>PROJECT REF:</strong> ${ref}</p>
    <p><strong>LOCATION:</strong> ${loc}</p>
    <p><strong>EFFECTIVE POOL VOLUME:</strong> ${volumeM3.toFixed(2)} m³</p>
    <p><strong>TARGET FREE CHLORINE:</strong> ${targetCl} ppm</p>
    <p><strong>UAE CLIMATE FACTOR:</strong> ${uae}</p>
    <p><strong>CURRENT PH:</strong> ${phNow} · <strong>TARGET PH:</strong> ${phTarget}</p>
    <p><strong>CHLORINE BRAND:</strong> ${brandName}</p>
  `;

  brandHeader.textContent = brandName + " (Kg)";
  tableMeta.textContent = "EFFECTIVE POOL VOLUME: " + volumeM3.toFixed(2) + " m³";

  tableBody.innerHTML = `
    <tr class="row-daily">
      <td>DAILY</td>
      <td>${dailyCl.toFixed(3)}</td>
      <td>${brandKg.toFixed(3)}</td>
      <td>${acidKg.toFixed(3)}</td>
    </tr>
    <tr class="row-weekly">
      <td>WEEKLY</td>
      <td>${(dailyCl*7).toFixed(3)}</td>
      <td>${(brandKg*7).toFixed(3)}</td>
      <td>${(acidKg*7).toFixed(3)}</td>
    </tr>
    <tr class="row-monthly">
      <td>MONTHLY</td>
      <td>${(dailyCl*30).toFixed(3)}</td>
      <td>${(brandKg*30).toFixed(3)}</td>
      <td>${(acidKg*30).toFixed(3)}</td>
    </tr>
  `;

  status.innerHTML = `<span class="status-dot"></span>Calculation complete`;
}

/* -----------------------------------------------------------
   SAVE / LOAD / EXPORT / IMPORT
----------------------------------------------------------- */
saveLocal.onclick = () => {
  const data = {
    projectName: projectName.value,
    projectRef: projectRef.value,
    location: location.value,
    surfaceArea: surfaceArea.value,
    avgDepth: avgDepth.value,
    volume: volume.value,
    targetCl: targetCl.value,
    uaeFactor: uaeFactor.value,
    currentPh: currentPh.value,
    targetPh: targetPh.value,
    brand: brand.value
  };
  localStorage.setItem("poolSettings", JSON.stringify(data));
  status.innerHTML = `<span class="status-dot"></span>Settings saved`;
};

loadLocal.onclick = () => {
  const data = JSON.parse(localStorage.getItem("poolSettings") || "{}");
  Object.keys(data).forEach(k => { if (document.getElementById(k)) document.getElementById(k).value = data[k]; });
  status.innerHTML = `<span class="status-dot"></span>Settings loaded`;
};

exportJson.onclick = () => {
  const data = localStorage.getItem("poolSettings");
  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pool_settings.json";
  a.click();
};

importJson.onclick = () => jsonFile.click();

jsonFile.onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    const data = JSON.parse(reader.result);
    Object.keys(data).forEach(k => { if (document.getElementById(k)) document.getElementById(k).value = data[k]; });
    status.innerHTML = `<span class="status-dot"></span>Settings imported`;
  };
  reader.readAsText(file);
};

/* -----------------------------------------------------------
   EXPORT PDF / WORD
----------------------------------------------------------- */
pdfBtn.onclick = () => window.print();

wordBtn.onclick = () => {
  const html = summaryCard.innerHTML;
  const blob = new Blob(['\ufeff', html], { type: "application/msword" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Pool_Dose_Summary.doc";
  a.click();
};

/* -----------------------------------------------------------
   CALCULATE BUTTON
----------------------------------------------------------- */
calcBtn.onclick = calc;
</script>

</body>
</html>
