<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SWIMMING POOL/WATER FEATURE CHLORINE & PH CALCULATIONS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --card: #0b1120;
      --card-soft: #0f172a;
      --border: #1f2937;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --error: #f97373;
      --success: #4ade80;
      --warning: #facc15;
      --radius: 12px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    .app {
      max-width: 1240px;
      margin: 0 auto;
      padding: 20px 16px 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: minmax(0, 1fr); }
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px 16px 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.5);
    }

    .card-title {
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field small {
      font-size: 10px;
      color: #6b7280;
    }

    input, select {
      width: 100%;
      margin-top: 4px;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56,189,248,0.4);
    }

    .error {
      border-color: var(--error) !important;
      box-shadow: 0 0 0 1px rgba(248,113,113,0.4) !important;
    }

    button {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #334155;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0b1120;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin: 4px 6px 4px 0;
    }

    button.secondary {
      background: #0f172a;
      color: var(--muted);
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 6px;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(74,222,128,0.25);
    }

    .status.warn .status-dot {
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(250,204,21,0.25);
    }

    .status.err .status-dot {
      background: var(--error);
      box-shadow: 0 0 0 4px rgba(248,113,113,0.25);
    }

    .table-card {
      margin-top: 10px;
      background: var(--card-soft);
      border-radius: var(--radius);
      border: 1px solid #334155;
      padding: 14px;
    }

    .table-title {
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .table-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 7px 8px;
      text-align: left;
    }

    thead tr {
      background: #1e293b;
    }

    .row-daily {
      background: rgba(56,189,248,0.12);
    }

    .row-weekly {
      background: rgba(250,204,21,0.12);
    }

    .row-monthly {
      background: rgba(248,113,113,0.12);
    }

    #poolDetails p {
      margin: 2px 0;
      font-size: 13px;
    }

    @media print {
      .no-print { display: none !important; }
      body { background: #ffffff; color: #000000; }
      .card, .table-card {
        background: #ffffff !important;
        border-color: #d1d5db !important;
        box-shadow: none !important;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="grid">
    <!-- LEFT: INPUTS -->
    <div class="card no-print">
      <div class="card-title">Pool Inputs</div>

      <div class="field">
        <label for="projectName">Project Name</label>
        <input id="projectName" type="text" placeholder="e.g. SOBHA THE CREST" />
      </div>

      <div class="field">
        <label for="projectRef">Project Ref</label>
        <input id="projectRef" type="text" placeholder="e.g. P-24-POOL-017" />
      </div>

      <div class="field">
        <label for="location">Location</label>
        <input id="location" type="text" value="Dubai, UAE" />
      </div>

      <div class="field">
        <label for="surfaceArea">Surface Area (m²)</label>
        <input id="surfaceArea" type="number" step="0.01" />
      </div>

      <div class="field">
        <label for="avgDepth">Average Depth (m)</label>
        <input id="avgDepth" type="number" step="0.01" />
      </div>

      <div class="field">
        <label for="volume">Pool Volume (m³)</label>
        <input id="volume" type="number" step="0.01" />
        <small>If left empty, it will be calculated from area × depth.</small>
      </div>

      <div class="field">
        <label for="targetCl">Target Free Chlorine (ppm)</label>
        <input id="targetCl" type="number" value="2.5" step="0.1" />
      </div>

      <div class="field">
        <label for="uaeFactor">UAE Climate Factor</label>
        <input id="uaeFactor" type="number" value="1.25" step="0.05" />
      </div>

      <div class="field">
        <label for="currentPh">Current pH</label>
        <input id="currentPh" type="number" value="7.8" step="0.01" />
      </div>

      <div class="field">
        <label for="targetPh">Target pH</label>
        <input id="targetPh" type="number" value="7.2" step="0.01" />
      </div>

      <div class="field">
        <label for="brand">Chlorine Brand</label>
        <select id="brand">
          <option value="HTH® Dry Chlorine Granular (Calcium Hypochlorite 70%)" selected>
            HTH® Dry Chlorine Granular (Calcium Hypochlorite 70%)
          </option>
          <option value="Aquachlor (Calcium Hypochlorite 70%)">Aquachlor (Calcium Hypochlorite 70%)</option>
          <option value="HI-CHLON 65G (≥65% available chlorine)">HI-CHLON 65G (≥65% available chlorine)</option>
        </select>
      </div>

      <div>
        <button id="calcBtn">Calculate</button>
        <button id="pdfBtn" class="secondary">Export PDF</button>
        <button id="wordBtn" class="secondary">Export Word</button>
        <button id="excelBtn" class="secondary">Export Excel</button>
      </div>

      <div style="margin-top:8px;">
        <button id="saveLocal" class="secondary">Save Settings</button>
        <button id="loadLocal" class="secondary">Load Settings</button>
        <button id="exportJson" class="secondary">Export JSON</button>
        <button id="importJson" class="secondary">Import JSON</button>
        <input id="jsonFile" type="file" accept="application/json" style="display:none;" />
      </div>

      <div class="status" id="status"><span class="status-dot"></span>Ready</div>
    </div>

    <!-- RIGHT: SUMMARY + TABLE -->
    <div class="card" id="summaryCard">
      <div class="card-title">Swimming Pool / Water Feature Chlorine & pH Calculations</div>

      <div id="poolDetails"></div>

      <div class="table-card">
        <div class="table-title">Chlorine & Pool Acid Demand Summary (Kg Only)</div>
        <div class="table-meta" id="tableMeta">EFFECTIVE POOL VOLUME: –</div>

        <table id="demandTable">
          <thead>
            <tr>
              <th>PERIOD</th>
              <th>ACTIVE CHLORINE (Kg)</th>
              <th id="brandHeader">Brand (Kg)</th>
              <th>POOL ACID NaHSO₄ (Kg)</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="row-daily"><td>DAILY</td><td>–</td><td>–</td><td>–</td></tr>
            <tr class="row-weekly"><td>WEEKLY</td><td>–</td><td>–</td><td>–</td></tr>
            <tr class="row-monthly"><td>MONTHLY</td><td>–</td><td>–</td><td>–</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  const el = id => document.getElementById(id);

  function setStatus(msg, type = "ok") {
    const s = el("status");
    s.className = "status " + (type === "warn" ? "warn" : type === "err" ? "err" : "");
    s.innerHTML = `<span class="status-dot"></span>${msg}`;
  }

  function setError(inputEl, hasError) {
    if (!inputEl) return;
    if (hasError) inputEl.classList.add("error");
    else inputEl.classList.remove("error");
  }

  function getVolume() {
    const area = parseFloat(el("surfaceArea").value);
    const depth = parseFloat(el("avgDepth").value);
    const volInput = parseFloat(el("volume").value);

    let volumeM3 = NaN;

    if (!isNaN(volInput) && volInput > 0) {
      volumeM3 = volInput;
    } else if (!isNaN(area) && area > 0 && !isNaN(depth) && depth > 0) {
      volumeM3 = area * depth;
      el("volume").value = volumeM3.toFixed(2);
    }

    return volumeM3;
  }

  function calculate() {
    const projectName = el("projectName").value || "N/A";
    const projectRef = el("projectRef").value || "N/A";
    const location = el("location").value || "Dubai, UAE";
    const targetClVal = parseFloat(el("targetCl").value);
    const uaeFactor = parseFloat(el("uaeFactor").value);
    const currentPh = parseFloat(el("currentPh").value);
    const targetPh = parseFloat(el("targetPh").value);
    const brandName = el("brand").value;

    const volumeM3 = getVolume();

    let hasError = false;

    setError(el("surfaceArea"), false);
    setError(el("avgDepth"), false);
    setError(el("volume"), false);
    setError(el("targetCl"), false);
    setError(el("uaeFactor"), false);
    setError(el("currentPh"), false);
    setError(el("targetPh"), false);

    if (isNaN(volumeM3) || volumeM3 <= 0) {
      setError(el("volume"), true);
      setError(el("surfaceArea"), true);
      setError(el("avgDepth"), true);
      hasError = true;
    }
    if (isNaN(targetClVal) || targetClVal <= 0) {
      setError(el("targetCl"), true);
      hasError = true;
    }
    if (isNaN(uaeFactor) || uaeFactor <= 0) {
      setError(el("uaeFactor"), true);
      hasError = true;
    }
    if (isNaN(currentPh)) {
      setError(el("currentPh"), true);
      hasError = true;
    }
    if (isNaN(targetPh)) {
      setError(el("targetPh"), true);
      hasError = true;
    }

    if (hasError) {
      setStatus("Please correct highlighted fields.", "err");
      return null;
    }

    const dailyActiveClKg = volumeM3 * targetClVal * uaeFactor / 1000;
    const brandFraction = brandName.includes("65") ? 0.65 : 0.70;
    const dailyBrandKg = dailyActiveClKg / brandFraction;

    const deltaPh = currentPh - targetPh;
    const dailyAcidKg = deltaPh > 0 ? (volumeM3 * deltaPh * 50) / 7000 : 0;

    const weeklyActiveClKg = dailyActiveClKg * 7;
    const weeklyBrandKg = dailyBrandKg * 7;
    const weeklyAcidKg = dailyAcidKg * 7;

    const monthlyActiveClKg = dailyActiveClKg * 30;
    const monthlyBrandKg = dailyBrandKg * 30;
    const monthlyAcidKg = dailyAcidKg * 30;

    el("poolDetails").innerHTML = `
      <p><strong>PROJECT NAME:</strong> ${projectName}</p>
      <p><strong>PROJECT REF:</strong> ${projectRef}</p>
      <p><strong>LOCATION:</strong> ${location}</p>
      <p><strong>EFFECTIVE POOL VOLUME:</strong> ${volumeM3.toFixed(2)} m³</p>
      <p><strong>TARGET FREE CHLORINE:</strong> ${targetClVal.toFixed(2)} ppm</p>
      <p><strong>UAE CLIMATE FACTOR:</strong> ${uaeFactor.toFixed(2)}</p>
      <p><strong>CURRENT PH:</strong> ${currentPh.toFixed(2)} · <strong>TARGET PH:</strong> ${targetPh.toFixed(2)}</p>
      <p><strong>CHLORINE BRAND:</strong> ${brandName}</p>
    `;

    el("brandHeader").textContent = brandName + " (Kg)";
    el("tableMeta").textContent = "EFFECTIVE POOL VOLUME: " + volumeM3.toFixed(2) + " m³";

    el("tableBody").innerHTML = `
      <tr class="row-daily">
        <td>DAILY</td>
        <td>${dailyActiveClKg.toFixed(3)}</td>
        <td>${dailyBrandKg.toFixed(3)}</td>
        <td>${dailyAcidKg.toFixed(3)}</td>
      </tr>
      <tr class="row-weekly">
        <td>WEEKLY</td>
        <td>${weeklyActiveClKg.toFixed(3)}</td>
        <td>${weeklyBrandKg.toFixed(3)}</td>
        <td>${weeklyAcidKg.toFixed(3)}</td>
      </tr>
      <tr class="row-monthly">
        <td>MONTHLY</td>
        <td>${monthlyActiveClKg.toFixed(3)}</td>
        <td>${monthlyBrandKg.toFixed(3)}</td>
        <td>${monthlyAcidKg.toFixed(3)}</td>
      </tr>
    `;

    setStatus("Calculation complete. Table updated (Kg only).", "ok");

    return {
      projectName,
      projectRef,
      location,
      volumeM3,
      targetClVal,
      uaeFactor,
      currentPh,
      targetPh,
      brandName,
      dailyActiveClKg,
      weeklyActiveClKg,
      monthlyActiveClKg,
      dailyBrandKg,
      weeklyBrandKg,
      monthlyBrandKg,
      dailyAcidKg,
      weeklyAcidKg,
      monthlyAcidKg
    };
  }

  // AUTO-CALCULATE ON INPUT CHANGE
  ["projectName","projectRef","location","surfaceArea","avgDepth","volume","targetCl","uaeFactor","currentPh","targetPh","brand"]
    .forEach(id => {
      el(id).addEventListener("input", () => {
        calculate();
      });
    });

  // BUTTONS
  el("calcBtn").addEventListener("click", e => {
    e.preventDefault();
    calculate();
  });

  // SAVE / LOAD / JSON
  el("saveLocal").addEventListener("click", () => {
    const data = {
      projectName: el("projectName").value,
      projectRef: el("projectRef").value,
      location: el("location").value,
      surfaceArea: el("surfaceArea").value,
      avgDepth: el("avgDepth").value,
      volume: el("volume").value,
      targetCl: el("targetCl").value,
      uaeFactor: el("uaeFactor").value,
      currentPh: el("currentPh").value,
      targetPh: el("targetPh").value,
      brand: el("brand").value
    };
    localStorage.setItem("poolSettings", JSON.stringify(data));
    setStatus("Settings saved locally.", "ok");
  });

  el("loadLocal").addEventListener("click", () => {
    const raw = localStorage.getItem("poolSettings");
    if (!raw) {
      setStatus("No saved settings found.", "warn");
      return;
    }
    const data = JSON.parse(raw);
    Object.keys(data).forEach(k => {
      if (el(k)) el(k).value = data[k];
    });
    setStatus("Settings loaded.", "ok");
    calculate();
  });

  el("exportJson").addEventListener("click", () => {
    const raw = localStorage.getItem("poolSettings");
    if (!raw) {
      setStatus("Save settings first before exporting JSON.", "warn");
      return;
    }
    const blob = new Blob([raw], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "pool_settings.json";
    a.click();
    setStatus("JSON settings exported.", "ok");
  });

  el("importJson").addEventListener("click", () => {
    el("jsonFile").click();
  });

  el("jsonFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        Object.keys(data).forEach(k => {
          if (el(k)) el(k).value = data[k];
        });
        setStatus("JSON settings imported.", "ok");
        calculate();
      } catch {
        setStatus("Invalid JSON file.", "err");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // EXPORT PDF
  el("pdfBtn").addEventListener("click", () => {
    const calc = calculate();
    if (!calc) return;
    setStatus("Use browser print dialog to save as PDF.", "warn");
    window.print();
  });

  // EXPORT WORD
  el("wordBtn").addEventListener("click", () => {
    const calc = calculate();
    if (!calc) return;

    const summaryHtml = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:w="urn:schemas-microsoft-com:office:word"
            xmlns="http://www.w3.org/TR/REC-html40">
      <head><meta charset="utf-8"><title>SWIMMING POOL/WATER FEATURE CHLORINE & PH CALCULATIONS</title></head>
      <body>
        <h2>SWIMMING POOL/WATER FEATURE CHLORINE & PH CALCULATIONS</h2>
        <h3>POOL DETAILS</h3>
        <p><strong>PROJECT NAME:</strong> ${calc.projectName}</p>
        <p><strong>PROJECT REF:</strong> ${calc.projectRef}</p>
        <p><strong>LOCATION:</strong> ${calc.location}</p>
        <p><strong>EFFECTIVE POOL VOLUME:</strong> ${calc.volumeM3.toFixed(2)} m³</p>
        <p><strong>TARGET FREE CHLORINE:</strong> ${calc.targetClVal?.toFixed ? calc.targetClVal.toFixed(2) : calc.targetClVal} ppm</p>
        <p><strong>UAE CLIMATE FACTOR:</strong> ${calc.uaeFactor?.toFixed ? calc.uaeFactor.toFixed(2) : calc.uaeFactor}</p>
        <p><strong>CURRENT PH:</strong> ${calc.currentPh?.toFixed ? calc.currentPh.toFixed(2) : calc.currentPh} · <strong>TARGET PH:</strong> ${calc.targetPh?.toFixed ? calc.targetPh.toFixed(2) : calc.targetPh}</p>
        <p><strong>CHLORINE BRAND:</strong> ${calc.brandName}</p>

        <h3>DAILY / WEEKLY / MONTHLY DEMAND (Kg ONLY)</h3>
        <table border="1" cellspacing="0" cellpadding="5" style="border-collapse:collapse;">
          <tr style="background:#e5e7eb;">
            <th>PERIOD</th>
            <th>ACTIVE CHLORINE (Kg)</th>
            <th>${calc.brandName} (Kg)</th>
            <th>POOL ACID NaHSO₄ (Kg)</th>
          </tr>
          <tr>
            <td>DAILY</td>
            <td>${calc.dailyActiveClKg.toFixed(3)}</td>
            <td>${calc.dailyBrandKg.toFixed(3)}</td>
            <td>${calc.dailyAcidKg.toFixed(3)}</td>
          </tr>
          <tr>
            <td>WEEKLY</td>
            <td>${calc.weeklyActiveClKg.toFixed(3)}</td>
            <td>${calc.weeklyBrandKg.toFixed(3)}</td>
            <td>${calc.weeklyAcidKg.toFixed(3)}</td>
          </tr>
          <tr>
            <td>MONTHLY</td>
            <td>${calc.monthlyActiveClKg.toFixed(3)}</td>
            <td>${calc.monthlyBrandKg.toFixed(3)}</td>
            <td>${calc.monthlyAcidKg.toFixed(3)}</td>
          </tr>
        </table>
      </body></html>
    `;

    const blob = new Blob(['\ufeff', summaryHtml], { type: "application/msword" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Pool_Dose_Summary.doc";
    a.click();
    setStatus("Word file exported.", "ok");
  });

  // EXPORT EXCEL (CSV)
  el("excelBtn").addEventListener("click", () => {
    const calc = calculate();
    if (!calc) return;

    const rows = [
      ["PERIOD","ACTIVE CHLORINE (Kg)",`${calc.brandName} (Kg)`,"POOL ACID NaHSO₄ (Kg)`"],
      ["DAILY", calc.dailyActiveClKg.toFixed(3), calc.dailyBrandKg.toFixed(3), calc.dailyAcidKg.toFixed(3)],
      ["WEEKLY", calc.weeklyActiveClKg.toFixed(3), calc.weeklyBrandKg.toFixed(3), calc.weeklyAcidKg.toFixed(3)],
      ["MONTHLY", calc.monthlyActiveClKg.toFixed(3), calc.monthlyBrandKg.toFixed(3), calc.monthlyAcidKg.toFixed(3)]
    ];

    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Pool_Dose_Summary.csv";
    a.click();
    setStatus("Excel (CSV) exported.", "ok");
  });

  // Initial auto-calc with defaults
  calculate();
</script>
</body>
</html>
